<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="A small Hello World landing page for a Vercel deployment smoke test."
    />
    <title>Hello World Landing</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #121826;
        --muted: #536071;
        --paper: #f7f8fb;
        --accent: #0f766e;
        --accent-dark: #134e4a;
        --line: rgba(18, 24, 38, 0.14);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: var(--paper);
        color: var(--ink);
      }

      main {
        min-height: 100vh;
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(320px, 46vw);
      }

      .hero {
        display: flex;
        min-height: 100vh;
        align-items: center;
        padding: clamp(40px, 8vw, 104px);
      }

      .hero-inner {
        max-width: 680px;
      }

      .eyebrow {
        margin: 0 0 18px;
        color: var(--accent-dark);
        font-size: 0.82rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        max-width: 10ch;
        font-size: clamp(3rem, 8vw, 7rem);
        line-height: 0.95;
        letter-spacing: 0;
      }

      .lede {
        margin: 28px 0 0;
        max-width: 560px;
        color: var(--muted);
        font-size: clamp(1.08rem, 2vw, 1.35rem);
        line-height: 1.65;
      }

      .checks {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 34px;
        padding: 0;
        list-style: none;
      }

      .checks li {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 10px 13px;
        background: rgba(255, 255, 255, 0.72);
        color: #253044;
        font-size: 0.95rem;
        font-weight: 650;
      }

      .visual {
        position: relative;
        min-height: 100vh;
        overflow: hidden;
        background:
          linear-gradient(rgba(18, 24, 38, 0.18), rgba(18, 24, 38, 0.52)),
          url("https://images.unsplash.com/photo-1498050108023-c5249f4df085?auto=format&fit=crop&w=1600&q=80")
            center / cover;
      }

      .visual::after {
        position: absolute;
        right: 32px;
        bottom: 32px;
        border: 1px solid rgba(255, 255, 255, 0.34);
        border-radius: 8px;
        padding: 11px 13px;
        background: rgba(18, 24, 38, 0.42);
        color: white;
        content: "Ready for Vercel";
        font-size: 0.92rem;
        font-weight: 700;
        backdrop-filter: blur(12px);
      }

      @media (max-width: 800px) {
        main {
          grid-template-columns: 1fr;
        }

        .hero {
          min-height: 72vh;
          padding: 48px 24px;
        }

        .visual {
          min-height: 28vh;
        }

        .visual::after {
          right: 18px;
          bottom: 18px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="hero" aria-labelledby="page-title">
        <div class="hero-inner">
          <p class="eyebrow">Deployment smoke test</p>
          <h1 id="page-title">Hello World</h1>
          <p class="lede">
            A tiny static landing page for checking that GitHub can hand a
            clean project to Vercel and produce a successful deployment.
          </p>
          <ul class="checks" aria-label="Project checks">
            <li>Static HTML</li>
            <li>No dependencies</li>
            <li>Vercel ready</li>
          </ul>
        </div>
      </section>
      <div class="visual" aria-hidden="true"></div>
    </main>
  </body>
</html>
